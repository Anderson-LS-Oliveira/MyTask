<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>MyTask</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>

  <body>

    <header>
      <h1>MyTask</h1>
    </header>

    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
      Nova Tarefa
    </button>

    <div class="modal fade" id="exampleModal">
      <div class="modal-dialog">
        <div class="modal-content">

          <div class="modal-header">
            <h1 class="modal-title fs-5">Nova Tarefa</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <input type="text" id="titulo" class="form-control mb-2" placeholder="Título">
            <textarea id="descricao" class="form-control" placeholder="Descrição"></textarea>
          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button id="salvar" class="btn btn-primary">Salvar</button>
          </div>

        </div>
      </div>
    </div>

    <div id="listaTarefas" class="mt-3"></div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  </body>
</html>
